<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #d9d9d9;
    font-family: Arial, sans-serif;
  }

  .login-box {
    width: 380px;
    background: #cfd2e6;
    padding: 30px;
    border-radius: 10px;
    position: relative;
  }

  /* dotted border  */
  .login-box::before {
    content: "";
    position: absolute;
    top: 4px;
    left: 4px;
    right: 4px;
    bottom: 4px;
    border: 5px dotted #5a63d8;
    border-radius: 10px;
    pointer-events: none;
  }

  h2 {
    text-align: center;
    color: #5a63d8;
    font-style: italic;
    margin-bottom: 25px;
  }

  label {
    display: block;
    color: #5a63d8;
    font-weight: bold;
    margin-bottom: 5px;
  }

  input {
    width: 100%;
    height: 40px;
    border: none;
    background: #eeeeee;
    margin-bottom: 20px;
    padding: 0 10px;
    border-radius: 3px;
    outline: none;
  }

  .forgot {
    text-align: right;
    margin-top: -10px;
    margin-bottom: 20px;
  }

  .forgot a {
    color: #5a63d8;
    text-decoration: none;
    font-size: 14px;
  }

  button {
    width: 100%;
    height: 50px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(to right, #5a63d8, #6f7cff);
    color: white;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="login-box">
  <h2>Welcome again!</h2>

  <form>
    <label>Mail *</label>
    <input type="email" required>

    <label>Password *</label>
    <input type="password" required>

    <div class="forgot">
      <a href="#">Forgot Password?</a>
    </div>

    <button type="submit">Log In</button>
  </form>
</div>

</body>
</html>
